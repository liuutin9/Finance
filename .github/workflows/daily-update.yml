name: Daily Update

on:
  schedule:
    # 台灣時間 14:30 = UTC 06:30
    - cron: '30 6 * * *'
    # 台灣時間 06:00 = UTC 前一天 22:00
    - cron: '0 22 * * *'
  workflow_dispatch:  # 允許在 Actions 頁面手動觸發,方便測試

permissions:
  contents: write  # 允許這個 workflow 把 commit push 回 repo

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Run update script
        run: python main.py
        # 如果 main.py 需要 API 金鑰等機密資訊,在這裡加 env:
        # env:
        #   MY_API_KEY: ${{ secrets.MY_API_KEY }}

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "daily update"
          git push